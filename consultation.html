<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consultation gratuite | Djana</title>
  <link rel="icon" type="image/png" href="assets/images/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>
  <header class="page-hero"><div class="container"><span class="breadcrumb-custom">Accueil / Consultation</span><h1 class="mt-3">Obtenez une consultation gratuite maintenant.</h1><p class="section-lead text-white-50">Présentez votre besoin et recevez une première orientation technique.</p></div></header>
  <main><section class="section-padding"><div class="container"><form class="card-clean p-4 p-lg-5 reveal" data-validate data-whatsapp-form="consultation" novalidate><div class="row g-3"><div class="col-md-6"><label class="form-label">Nom complet</label><input class="form-control" required></div><div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email"></div><div class="col-md-6"><label class="form-label">Téléphone / WhatsApp</label><input class="form-control"></div><div class="col-md-6"><label class="form-label">Nom de l’entreprise</label><input class="form-control"></div><div class="col-md-6"><label class="form-label">Secteur d’activité</label><input class="form-control" required></div><div class="col-md-6"><label class="form-label">Type de client</label><select class="form-select" required><option value="">Choisir</option><option>Particulier</option><option>Entreprise</option><option>Institution</option><option>ONG</option><option>École</option><option>Autre</option></select></div><div class="col-md-6"><label class="form-label">Service recherché</label><select class="form-select" required><option value="">Choisir</option><option>Développement de solutions numériques</option><option>Maintenance informatique</option><option>Réseaux et infrastructures</option><option>Design UI/UX</option><option>Publicité digitale</option><option>Mise à disposition de talents</option><option>Formation</option></select></div><div class="col-md-6"><label class="form-label">Budget estimatif</label><input class="form-control" placeholder="Ex. 500 USD, 2 000 USD, à définir"></div><div class="col-md-6"><label class="form-label">Délai souhaité</label><input class="form-control" required></div><div class="col-md-6"><label class="form-label">Préférence de contact</label><select class="form-select" required><option value="">Choisir</option><option>Appel</option><option>WhatsApp</option><option>Email</option><option>Visioconférence</option></select></div><div class="col-12"><label class="form-label">Description du besoin</label><textarea class="form-control" rows="5" required></textarea></div><div class="col-12"><label class="form-label">Fichier ou document de référence</label><div class="form-control text-muted-custom">Champ visuel uniquement, aucun upload réel configuré</div></div><div class="col-12"><div class="form-status mb-3"></div><button class="btn btn-primary" type="submit">Envoyer la demande</button></div></div></form></div></section></main>
  <div id="footer"></div>
  <div id="whatsapp"></div>
  <button class="back-to-top" aria-label="Retour en haut"><i class="bi bi-arrow-up"></i></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
